name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not a valid semver tag (expected vX.Y.Z)"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        run: |
          chmod +x scripts/release/extract-changelog.sh
          ./scripts/release/extract-changelog.sh --tag "$GITHUB_REF_NAME" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md
