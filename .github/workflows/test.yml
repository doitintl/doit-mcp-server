name: Test on Pull Request

on:
  pull_request:
    branches:
      - "**"

jobs:
  lint-test-build:
    name: Tests and Build - Node 18
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run lint and format checks
        run: yarn check:ci

      - name: Run unit tests
        run: yarn test

      - name: Build
        run: yarn build

  worker-checks:
    name: Worker Checks - Node 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install CloudFlare worker dependencies
        run: yarn install --frozen-lockfile
        working-directory: doit-mcp-server

      - name: Type-check CloudFlare worker
        run: yarn type-check
        working-directory: doit-mcp-server

      - name: Build worker (dry-run)
        run: npx wrangler deploy --dry-run --outdir /tmp/worker-dist
        working-directory: doit-mcp-server

  integration-tests:
    name: Integration Tests - Node 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install integration test dependencies
        run: yarn install --frozen-lockfile
        working-directory: test/integration

      - name: Run integration tests
        run: yarn test
        working-directory: test/integration
