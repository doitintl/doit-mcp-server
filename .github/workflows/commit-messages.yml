name: Commit Messages

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  checkcommits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        id: checkcommits
        continue-on-error: true
        run: |
          bash scripts/dev/check-commits.sh origin/${{ github.base_ref }} ${{ github.event.pull_request.head.sha }} 2>&1 | tee /tmp/checkcommits.txt
          echo "output=$(base64 -w0 /tmp/checkcommits.txt)" >> "$GITHUB_OUTPUT"
          exit "${PIPESTATUS[0]}"

      - name: Post failure comment
        if: steps.checkcommits.outcome == 'failure' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-checkcommits-mark -->';
            const output = Buffer.from('${{ steps.checkcommits.outputs.output }}', 'base64').toString('utf8').replace(/`/g, '\\`');
            const body = [
              marker,
              '## Commit Message Lint Failed',
              '',
              'One or more commit messages do not follow the [Conventional Commits](https://www.conventionalcommits.org/) format.',
              '',
              '<details>',
              '<summary>Details</summary>',
              '',
              '```',
              output,
              '```',
              '',
              '</details>'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Remove stale comment
        if: steps.checkcommits.outcome == 'success' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ci-checkcommits-mark -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
