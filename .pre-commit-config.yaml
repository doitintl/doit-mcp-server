repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-json

-   repo: local
    hooks:
    -   id: type-check
        name: TypeScript type check
        entry: yarn type-check
        language: system
        types: [ts]
        pass_filenames: false
    -   id: lint
        name: Biome lint
        entry: yarn lint
        language: system
        types: [ts]
        pass_filenames: false
